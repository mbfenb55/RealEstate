name: Vercel Deploy

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check Vercel secrets
        id: vercel-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are missing. Skipping GitHub Actions deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Choose deploy target
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "VERCEL_ENV=production" >> "$GITHUB_ENV"
            echo "VERCEL_DEPLOY_FLAGS=--prod" >> "$GITHUB_ENV"
          else
            echo "VERCEL_ENV=preview" >> "$GITHUB_ENV"
            echo "VERCEL_DEPLOY_FLAGS=" >> "$GITHUB_ENV"
          fi

      - name: Pull Vercel project settings
        if: steps.vercel-secrets.outputs.configured == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment="$VERCEL_ENV" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build with Vercel
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel build $VERCEL_DEPLOY_FLAGS --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel deploy --prebuilt $VERCEL_DEPLOY_FLAGS --token="${{ secrets.VERCEL_TOKEN }}"
